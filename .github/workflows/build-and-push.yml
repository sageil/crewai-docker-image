name: Build and push crewai image

on:
  workflow_dispatch:
    inputs:
      crewai_version:
        description: "CrewAI/CrewAI-tools version (e.g. 1.14.7 or v1.14.7)"
        required: true
      dry_run:
        description: "Validate workflow config and tags without pushing images"
        required: false
        default: "false"

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve CrewAI version
        id: version
        shell: bash
        run: |
          CREWAI_VERSION="${{ github.event.inputs.crewai_version }}"
          NORMALIZED="${CREWAI_VERSION#v}"
          if [[ ! "${NORMALIZED}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid crewai_version '${CREWAI_VERSION}'. Expected semver like 1.14.7 or v1.14.7." >&2
            exit 1
          fi
          echo "value=${NORMALIZED}" >> "$GITHUB_OUTPUT"

      - name: Dry run summary
        if: github.event.inputs.dry_run == 'true'
        run: |
          echo "DRY RUN: resolved CrewAI version = ${{ steps.version.outputs.value }}"
          echo "DRY RUN command:"
          echo "  docker buildx build --platform linux/amd64,linux/arm64 --build-arg CREWAI=${{ steps.version.outputs.value }} --tag sageil/crewai:${{ steps.version.outputs.value }} --tag sageil/crewai:latest ."

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event.inputs.dry_run != 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push multi-arch image
        if: github.event.inputs.dry_run != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            sageil/crewai:${{ steps.version.outputs.value }}
            sageil/crewai:latest
          build-args: |
            CREWAI=${{ steps.version.outputs.value }}

      - name: Dry run complete
        if: github.event.inputs.dry_run == 'true'
        run: |
          echo "DRY RUN completed. No image push was performed."
